<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akshay Parmar — Cloud &amp; DevOps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d0d0d;
    --paper:#fbfbfa;
    --line:#0d0d0d;
    --soft:#7a7a7a;
    --soft-2:#b4b4b0;
    --hair:rgba(13,13,13,0.10);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{background:var(--paper);}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', Arial, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 20px;
    position:relative;
    overflow-x:hidden;
  }

  /* signature: faint server/grid backdrop */
  .grid-bg{
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(var(--hair) 1px, transparent 1px),
      linear-gradient(90deg, var(--hair) 1px, transparent 1px);
    background-size:42px 42px;
    -webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 35%, black 10%, transparent 72%);
    mask-image:radial-gradient(ellipse 70% 60% at 50% 35%, black 10%, transparent 72%);
    pointer-events:none;
    z-index:0;
  }

  .card{
    width:100%;
    max-width:440px;
    position:relative;
    z-index:1;
  }

  .top-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:38px;
    opacity:0;
    animation:rise 0.7s cubic-bezier(.16,1,.3,1) forwards;
  }
  .mono{
    font-family:'JetBrains Mono', monospace;
  }
  .status{
    display:flex;
    align-items:center;
    gap:7px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--soft);
    text-transform:uppercase;
  }
  .dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--ink);
    box-shadow:0 0 0 3px rgba(13,13,13,0.08);
    animation:pulse 2.4s ease-in-out infinite;
  }
  .idx{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--soft-2);
  }

  .portrait-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:30px;
    opacity:0;
    animation:rise 0.8s cubic-bezier(.16,1,.3,1) 0.08s forwards;
  }
  .frame{
    width:152px;
    height:152px;
    position:relative;
    border-radius:50%;
  }
  .frame::before{
    content:"";
    position:absolute;
    inset:-9px;
    border-radius:50%;
    border:1px solid var(--hair);
  }
  .frame::after{
    content:"";
    position:absolute;
    inset:-9px;
    border-radius:50%;
    border-top:1px solid var(--ink);
    border-right:1px solid transparent;
    border-bottom:1px solid transparent;
    border-left:1px solid transparent;
    animation:spin 7s linear infinite;
  }
  .frame img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block;
    border:1.5px solid var(--ink);
    filter:grayscale(100%) contrast(1.08);
  }

  .identity{
    text-align:center;
    margin-bottom:30px;
    opacity:0;
    animation:rise 0.8s cubic-bezier(.16,1,.3,1) 0.16s forwards;
  }
  h1{
    font-family:'Fraunces', serif;
    font-optical-sizing:auto;
    font-weight:500;
    font-size:clamp(32px,7vw,42px);
    letter-spacing:-0.01em;
    line-height:1.02;
    margin-bottom:10px;
  }
  .role{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--soft);
  }
  .role span{ color:var(--ink); }

  .stack{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin:20px 0 4px;
    opacity:0;
    animation:rise 0.8s cubic-bezier(.16,1,.3,1) 0.24s forwards;
  }
  .pill{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.03em;
    padding:5px 11px;
    border:1px solid var(--hair);
    border-radius:20px;
    color:var(--soft);
  }

  .divider{
    display:flex;
    align-items:center;
    gap:12px;
    margin:32px 0 26px;
    opacity:0;
    animation:rise 0.8s cubic-bezier(.16,1,.3,1) 0.3s forwards;
  }
  .divider::before, .divider::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--hair);
  }
  .divider span{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--soft-2);
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:10px;
    opacity:0;
    animation:rise 0.8s cubic-bezier(.16,1,.3,1) 0.36s forwards;
  }

  .btn{
    display:flex;
    align-items:center;
    gap:16px;
    padding:16px 18px;
    border:1px solid var(--line);
    border-radius:3px;
    background:transparent;
    color:var(--ink);
    text-decoration:none;
    text-align:left;
    position:relative;
    overflow:hidden;
    transition:color 0.32s cubic-bezier(.16,1,.3,1);
  }
  .btn::before{
    content:"";
    position:absolute;
    inset:0;
    background:var(--ink);
    transform:translateX(-101%);
    transition:transform 0.38s cubic-bezier(.65,0,.35,1);
    z-index:0;
  }
  .btn:hover::before{ transform:translateX(0); }
  .btn:hover{ color:var(--paper); }
  .btn > *{ position:relative; z-index:1; }

  .btn .icon{
    width:19px; height:19px; flex-shrink:0;
  }
  .btn .num{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    color:var(--soft-2);
    width:16px;
    transition:color 0.32s ease;
  }
  .btn:hover .num{ color:rgba(251,251,250,0.5); }
  .btn .label-group{ flex:1; }
  .btn .label{
    display:block;
    font-size:15px;
    font-weight:500;
    letter-spacing:-0.005em;
  }
  .btn .sub{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    color:var(--soft);
    margin-top:2px;
    transition:color 0.32s ease;
  }
  .btn:hover .sub{ color:rgba(251,251,250,0.6); }
  .btn .arrow{
    width:14px; height:14px;
    opacity:0.55;
    transition:transform 0.32s cubic-bezier(.16,1,.3,1);
  }
  .btn:hover .arrow{ transform:translate(3px,-3px); }
  .btn:focus-visible{
    outline:2px solid var(--ink);
    outline-offset:3px;
  }

  footer{
    margin-top:38px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--soft-2);
    opacity:0;
    animation:rise 0.8s cubic-bezier(.16,1,.3,1) 0.42s forwards;
  }

  @keyframes rise{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:0.35; }
  }
  @keyframes spin{
    to{ transform:rotate(360deg); }
  }

  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{ animation:none !important; transition:none !important; }
    .top-row,.portrait-wrap,.identity,.stack,.divider,.links,footer{ opacity:1; }
  }

  @media (max-width:420px){
    .frame{ width:132px; height:132px; }
    h1{ font-size:30px; }
  }
</style>
</head>
